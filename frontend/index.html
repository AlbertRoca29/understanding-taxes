<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora IRPF</title>
    <link rel="icon" type="image/x-icon" href="../logo.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        @media (min-width: 768px) and (orientation: landscape),
               (min-width: 1024px) {
            .form-panel { flex: 0 0 440px; }
            .result-panel {
                max-height: calc(100vh - 80px);
                overflow-y: auto;
            }
        }

        /* ---- Toggle switch ---- */
        .switch {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-size: 0.88em;
            font-weight: 500;
        }
        .switch input[type="checkbox"] { display: none; }
        .slider {
            width: 38px;
            height: 22px;
            background: #ccc;
            border-radius: 12px;
            position: relative;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .slider::before {
            content: '';
            position: absolute;
            left: 3px;
            top: 3px;
            width: 16px;
            height: 16px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.2s;
        }
        .switch input[type="checkbox"]:checked + .slider { background: var(--primary); }
        .switch input[type="checkbox"]:checked + .slider::before { transform: translateX(16px); }

        /* ---- Accordion ---- */
        details {
            border: 1.5px solid var(--input-border);
            border-radius: 10px;
            overflow: hidden;
        }
        summary {
            font-weight: 600;
            font-size: 0.9em;
            color: var(--primary);
            padding: 11px 14px;
            cursor: pointer;
            outline: none;
            list-style: none;
            display: flex;
            align-items: center;
            gap: 8px;
            user-select: none;
            letter-spacing: 0.01em;
        }
        summary::-webkit-details-marker { display: none; }
        summary::before {
            content: '▶';
            font-size: 0.65em;
            transition: transform 0.2s;
            opacity: 0.7;
        }
        details[open] > summary::before { transform: rotate(90deg); }
        .group-content {
            padding: 8px 14px 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-top: 1px solid var(--input-border);
            background: #fafafa;
        }

        /* ---- Extra buttons ---- */
        .add-btn {
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 7px;
            padding: 8px 16px;
            font-size: 0.88em;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }
        .add-btn:hover { background: var(--primary-dark); }

        .remove-btn {
            background: #dc3545;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 5px 10px;
            font-size: 0.85em;
            cursor: pointer;
            font-family: inherit;
            font-weight: 500;
        }
        .remove-btn:hover { background: #b02a37; }

        /* ---- Result / plots ---- */
        #result { font-size: 0.95em; line-height: 1.7; }
        #plots { display: flex; flex-direction: column; gap: 20px; margin-top: 20px; }
        #plots img {
            max-width: 100%;
            border-radius: 12px;
            border: 1px solid #ebebeb;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
    </style>
</head>
<body>
    <nav class="navbar" id="navbar"></nav>

    <div class="page-wrapper">
        <div class="main-grid">

            <!-- LEFT: form -->
            <div class="form-panel">
                <h1>Calculadora IRPF</h1>
                <form id="irpfForm">
                    <div class="form-row">
                        <label for="gross">Sou brut anual (€) <span style="color:var(--primary)">*</span></label>
                        <input type="number" id="gross" name="gross" required step="any" placeholder="Ex: 30000">
                    </div>

                    <div class="form-row">
                        <label>Regió</label>
                        <div class="pill-group" id="regionPills">
                            <div class="pill selected" data-value="Catalunya">Catalunya</div>
                            <div class="pill" data-value="Mitjana espanyola">Mitjana espanyola</div>
                        </div>
                        <input type="hidden" id="region" name="region" value="Catalunya">
                    </div>

                    <div class="form-row">
                        <label for="n_pagues">Nombre de pagues <span style="color:var(--primary)">*</span></label>
                        <input type="number" id="n_pagues" name="n_pagues" required min="1" max="15" value="14" placeholder="Ex: 14">
                    </div>

                    <div class="form-row">
                        <label for="grup_cotitzacio">Grup de cotització SS <span style="color:var(--primary)">*</span></label>
                        <select id="grup_cotitzacio" name="grup_cotitzacio" required>
                            <option value="Grup 1 – Enginyers/Llicenciats/Alta direcció" selected>Grup 1 – Enginyers, Llicenciats, Alta direcció</option>
                            <option value="Grup 2 – Enginyers tècnics/Tècnics titulats">Grup 2 – Enginyers tècnics, Tècnics titulats</option>
                            <option value="Grup 3 – Caps administratius i de taller">Grup 3 – Caps administratius i de taller</option>
                            <option value="Grup 4 – Ajudants no titulats">Grup 4 – Ajudants no titulats</option>
                            <option value="Grup 5 – Oficials administratius">Grup 5 – Oficials administratius</option>
                            <option value="Grup 6 – Subalterns">Grup 6 – Subalterns</option>
                            <option value="Grup 7 – Auxiliars administratius">Grup 7 – Auxiliars administratius</option>
                            <option value="Grups 8-11 – Oficials, especialistes i peons">Grups 8-11 – Oficials, especialistes i peons</option>
                        </select>
                    </div>

                    <div class="form-row">
                        <label>Edat</label>
                        <div class="pill-group" id="agePills">
                            <div class="pill selected" data-value="30">&lt; 65</div>
                            <div class="pill" data-value="65">65+</div>
                            <div class="pill" data-value="75">75+</div>
                        </div>
                        <input type="hidden" id="age" name="age" value="30">
                    </div>

                    <div class="form-row">
                        <label>Tipus de contracte</label>
                        <div class="pill-group" id="contractTypePills">
                            <div class="pill selected" data-value="indefinite">Indefinit</div>
                            <div class="pill" data-value="temporary">Temporal</div>
                        </div>
                        <input type="hidden" id="contract_type" name="contract_type" value="indefinite">
                    </div>

                    <details>
                        <summary>Retribució en espècie i deduccions</summary>
                        <div class="group-content">
                            <div class="form-row">
                                <label for="retribucio_en_especie_ann">Retribució en espècie anual (€)</label>
                                <input type="number" id="retribucio_en_especie_ann" name="retribucio_en_especie_ann" value="0" step="any" placeholder="Ex: 0">
                            </div>
                            <div class="form-row">
                                <label for="other_deductions">Altres deduccions (€)</label>
                                <input type="number" id="other_deductions" name="other_deductions" value="0" step="any" placeholder="Ex: 0">
                            </div>
                        </div>
                    </details>

                    <details>
                        <summary>Situació personal i familiar</summary>
                        <div class="group-content">
                            <div class="form-row">
                                <label for="disability_percent_self">Discapacitat pròpia: <strong id="disability_percent_self_val">0%</strong></label>
                                <input type="range" id="disability_percent_self" name="disability_percent_self" min="0" max="100" value="0" style="width:100%;accent-color:var(--primary)">
                            </div>
                            <label class="switch">
                                <input type="checkbox" id="disability_self_help" name="disability_self_help">
                                <span class="slider"></span>
                                Necessita ajuda de mobilitat
                            </label>
                            <div>
                                <label style="font-weight:600;margin-bottom:8px;display:block;font-size:0.9em">Fills</label>
                                <div id="childrenList"></div>
                                <button type="button" class="add-btn" onclick="addChild()" style="margin-top:8px">+ Afegir fill</button>
                            </div>
                            <div>
                                <label style="font-weight:600;margin-bottom:8px;display:block;font-size:0.9em">Ascendents dependents</label>
                                <div id="ascendentsList"></div>
                                <button type="button" class="add-btn" onclick="addAscendent()" style="margin-top:8px">+ Afegir ascendent</button>
                            </div>
                        </div>
                    </details>

                    <details>
                        <summary>Familiars amb discapacitat</summary>
                        <div class="group-content">
                            <div id="relativesList"></div>
                            <button type="button" class="add-btn" onclick="addRelative()">+ Afegir familiar</button>
                        </div>
                    </details>

                    <button type="submit" class="btn-submit">Calcular</button>
                </form>
            </div>

            <!-- RIGHT: results -->
            <div class="result-panel">
                <div class="result-placeholder" id="resultPlaceholder">
                    Omple el formulari i prem <strong>Calcular</strong> per veure els resultats aquí.
                </div>
                <div id="result"></div>
                <div id="plots"></div>
            </div>

        </div>
    </div>

    <footer class="site-footer" id="site-footer"></footer>

    <script src="shared.js"></script>
    <script>
    // Pills
    function bindPills(groupId, hiddenId) {
        document.querySelectorAll('#' + groupId + ' .pill').forEach(pill => {
            pill.onclick = function() {
                document.querySelectorAll('#' + groupId + ' .pill').forEach(p => p.classList.remove('selected'));
                pill.classList.add('selected');
                document.getElementById(hiddenId).value = pill.getAttribute('data-value');
            };
        });
    }
    bindPills('regionPills', 'region');
    bindPills('agePills', 'age');
    bindPills('contractTypePills', 'contract_type');

    // Disability slider
    const disabilitySlider = document.getElementById('disability_percent_self');
    const disabilityVal = document.getElementById('disability_percent_self_val');
    disabilitySlider.oninput = function() { disabilityVal.textContent = this.value + '%'; };

    // Children
    let children = [];
    function renderChildren() {
        const list = document.getElementById('childrenList');
        list.innerHTML = '';
        children.forEach((child, i) => {
            const row = document.createElement('div');
            row.className = 'form-row';
            row.style.flexDirection = 'row';
            row.style.gap = '8px';
            row.style.alignItems = 'center';
            row.innerHTML = `
                <input type="number" min="0" max="30" placeholder="Edat" value="${child.age}" style="max-width:80px;flex:0 0 80px">
                <input type="number" min="0" max="100" placeholder="% discapacitat" value="${child.disability}" style="flex:1">
                <button type="button" class="remove-btn" onclick="removeChild(${i})">&times;</button>
            `;
            list.appendChild(row);
        });
    }
    window.addChild = function() { children.push({age:'',disability:''}); renderChildren(); };
    window.removeChild = function(i) { children.splice(i,1); renderChildren(); };
    renderChildren();

    // Ascendents
    let ascendents = [];
    function renderAscendents() {
        const list = document.getElementById('ascendentsList');
        list.innerHTML = '';
        ascendents.forEach((age, i) => {
            const row = document.createElement('div');
            row.className = 'form-row';
            row.style.flexDirection = 'row';
            row.style.gap = '8px';
            row.style.alignItems = 'center';
            row.innerHTML = `
                <input type="number" min="40" max="120" placeholder="Edat" value="${age}" style="flex:1">
                <button type="button" class="remove-btn" onclick="removeAscendent(${i})">&times;</button>
            `;
            list.appendChild(row);
        });
    }
    window.addAscendent = function() { ascendents.push(''); renderAscendents(); };
    window.removeAscendent = function(i) { ascendents.splice(i,1); renderAscendents(); };
    renderAscendents();

    // Relatives
    let relatives = [];
    function renderRelatives() {
        const list = document.getElementById('relativesList');
        list.innerHTML = '';
        relatives.forEach((rel, i) => {
            const row = document.createElement('div');
            row.className = 'form-row';
            row.style.flexDirection = 'row';
            row.style.gap = '8px';
            row.style.alignItems = 'center';
            row.innerHTML = `
                <input type="number" min="0" max="100" placeholder="% discapacitat" value="${rel.perc}" style="flex:1">
                <label class="switch" style="flex-shrink:0"><input type="checkbox" ${rel.help?'checked':''} onchange="toggleRelativeHelp(${i},this.checked)"><span class="slider"></span>Ajuda</label>
                <button type="button" class="remove-btn" onclick="removeRelative(${i})">&times;</button>
            `;
            list.appendChild(row);
        });
    }
    window.addRelative = function() { relatives.push({perc:'',help:false}); renderRelatives(); };
    window.removeRelative = function(i) { relatives.splice(i,1); renderRelatives(); };
    window.toggleRelativeHelp = function(i, val) { relatives[i].help = val; };
    renderRelatives();

    // Form submit
    document.getElementById('irpfForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const children_ages = children.map(c => c.age).filter(x=>x!=='').join(',');
        const children_disabilities = children.map(c => c.disability).filter(x=>x!=='').join(',');
        const ascendents_ages = ascendents.filter(x=>x!=='').join(',');
        const disability_relatives_perc = relatives.map(r => r.perc).filter(x=>x!=='').join(',');
        const disability_relatives_help = relatives.map(r => r.help ? 'true' : 'false').join(',');
        const data = {
            gross: parseFloat(document.getElementById('gross').value),
            region: document.getElementById('region').value,
            n_pagues: parseInt(document.getElementById('n_pagues').value),
            pagues_prorratejades: true,
            retribucio_en_especie_ann: parseFloat(document.getElementById('retribucio_en_especie_ann').value) || 0,
            grup_cotitzacio: document.getElementById('grup_cotitzacio').value,
            contract_type: document.getElementById('contract_type').value,
            other_deductions: parseFloat(document.getElementById('other_deductions').value) || 0,
            age: parseInt(document.getElementById('age').value),
            disability_percent_self: parseInt(document.getElementById('disability_percent_self').value),
            disability_self_help: document.getElementById('disability_self_help').checked,
            children_ages,
            children_disabilities,
            ascendents_ages,
            disability_relatives_perc,
            disability_relatives_help
        };

        const placeholder = document.getElementById('resultPlaceholder');
        const resultEl = document.getElementById('result');
        const plotsEl = document.getElementById('plots');
        placeholder.style.display = 'none';
        resultEl.innerHTML = '<div style="color:#888;padding:20px 0;text-align:center">Calculant…</div>';
        plotsEl.innerHTML = '';

        try {
            const response = await fetch('https://understanding-taxes-111926362104.europe-west1.run.app/api/calculate', {
            //const response = await fetch('http://localhost:8000/api/calculate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if (!response.ok) throw new Error('API error');
            const result = await response.json();
            const fmt = (n) => '€' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, '.');
            const pct = (n) => n.toFixed(2) + '%';
            const npagues = parseInt(document.getElementById('n_pagues').value);
            resultEl.innerHTML = `
<div style="font-size:0.93em;text-align:left;line-height:1.75;font-family:monospace;background:#f8f8f8;border-radius:12px;padding:16px 18px;border:1px solid #eee">
<div style="font-weight:700;color:#e2231a;margin-bottom:4px;font-family:Inter,sans-serif;font-size:0.95em;letter-spacing:0.04em">COTITZACIÓ SS</div>
Base mensual: <b>${fmt(result.base_ss_mensual)}</b>
<div style="margin-left:12px;color:#555;font-size:0.91em">
  · Contingències (${(result.ss_contingencies_comunes_mensual/result.base_ss_mensual*100).toFixed(2)}%): −${fmt(result.ss_contingencies_comunes_mensual)}<br>
  · Atur (${(result.ss_atur_mensual/result.base_ss_mensual*100).toFixed(2)}%): −${fmt(result.ss_atur_mensual)}<br>
  · Formació (${(result.ss_formacio_mensual/result.base_ss_mensual*100).toFixed(2)}%): −${fmt(result.ss_formacio_mensual)}<br>
  · MEI (${(result.ss_mei_mensual/result.base_ss_mensual*100).toFixed(2)}%): −${fmt(result.ss_mei_mensual)}
</div>
Total SS: <b>−${fmt(result.total_ss_mensual)}/mes</b> · <b>−${fmt(result.total_ss_anual)}/any</b>

<div style="border-top:1px solid #e0e4ea;margin:10px 0"></div>
<div style="font-weight:700;color:#e2231a;margin-bottom:4px;font-family:Inter,sans-serif;font-size:0.95em;letter-spacing:0.04em">IRPF</div>
Brut anual: ${fmt(result.rendiment_brut_treball)}<br>
<span style="color:#888">− Cotitzacions SS:</span> −${fmt(result.total_ss_anual)}<br>
<span style="color:#888">− Gastos deduïbles:</span> −${fmt(result.gastos_deducibles)}<br>
<span style="color:#888">− Red. rendiments treball:</span> −${fmt(result.reduccio_rendiments_treball)}<br>
<b>Base imposable: ${fmt(result.base_imponible)}</b> <span style="color:#888;font-size:0.91em">(mínim p/f: ${fmt(result.minim_personal_familiar)})</span><br>
<b>Quota IRPF: ${fmt(result.cuota_irpf_anual)}</b> &nbsp;·&nbsp; Retenció: <b>${pct(result.tipo_retencio)}</b> &nbsp;·&nbsp; Marginal: <b>${pct(result.marginal_irpf_percent)}</b>

<div style="border-top:1px solid #e0e4ea;margin:10px 0"></div>
<div style="font-weight:700;color:#e2231a;margin-bottom:4px;font-family:Inter,sans-serif;font-size:0.95em;letter-spacing:0.04em">PER PAGA (${npagues})</div>
${fmt(result.gross_per_paga)} − <span style="color:#888">SS ${fmt(result.ss_per_paga)}</span> − <span style="color:#888">IRPF ${fmt(result.irpf_per_paga)}</span> = <b style="font-size:1.08em">${fmt(result.sou_net_per_paga)}</b><br>
<span style="color:#888;font-size:0.88em">Equivalent mensual (÷12): ${fmt(result.sou_net_mensual_equivalent)}</span>
</div>`;

            if (result.plots && Array.isArray(result.plots)) {
                result.plots.forEach((img, i) => {
                    const image = document.createElement('img');
                    image.src = 'data:image/png;base64,' + img;
                    image.alt = 'Gràfic ' + (i+1);
                    plotsEl.appendChild(image);
                });
            }

            if (window.innerWidth < 1024) {
                document.querySelector('.result-panel').scrollIntoView({behavior:'smooth', block:'start'});
            }
        } catch (err) {
            resultEl.innerHTML = '<div style="color:#dc3545;padding:12px 0">Error: ' + err.message + '</div>';
        }
    });
    </script>
</body>
</html>
