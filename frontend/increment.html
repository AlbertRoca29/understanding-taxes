<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Increment de sou</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        @media (min-width: 768px) and (orientation: landscape),
               (min-width: 1024px) {
            .form-panel { flex: 0 0 400px; }
        }

        #result { font-size: 0.95em; line-height: 1.75; }
    </style>
</head>
<body>
    <nav class="navbar" id="navbar"></nav>

    <div class="page-wrapper">
        <div class="main-grid">

            <!-- LEFT: form -->
            <div class="form-panel">
                <h1>Increment de sou</h1>
                <form id="incrementForm">
                    <div class="form-row">
                        <label for="sou_actual">Sou actual (€) <span style="color:var(--primary)">*</span></label>
                        <input type="number" id="sou_actual" name="sou_actual" required step="any" placeholder="Ex: 25000">
                    </div>
                    <div class="form-row">
                        <label for="sou_nou">Nou sou (€) <span style="color:var(--primary)">*</span></label>
                        <input type="number" id="sou_nou" name="sou_nou" required step="any" placeholder="Ex: 27000">
                    </div>
                    <div class="form-row">
                        <label for="n_pagues">Nombre de pagues <span style="color:var(--primary)">*</span></label>
                        <input type="number" id="n_pagues" name="n_pagues" required min="1" max="15" value="14" placeholder="Ex: 14">
                    </div>
                    <div class="form-row">
                        <label for="grup_cotitzacio">Grup de cotització SS <span style="color:var(--primary)">*</span></label>
                        <select id="grup_cotitzacio" name="grup_cotitzacio" required>
                            <option value="Grup 1 – Enginyers/Llicenciats/Alta direcció" selected>Grup 1 – Enginyers, Llicenciats, Alta direcció</option>
                            <option value="Grup 2 – Enginyers tècnics/Tècnics titulats">Grup 2 – Enginyers tècnics, Tècnics titulats</option>
                            <option value="Grup 3 – Caps administratius i de taller">Grup 3 – Caps administratius i de taller</option>
                            <option value="Grup 4 – Ajudants no titulats">Grup 4 – Ajudants no titulats</option>
                            <option value="Grup 5 – Oficials administratius">Grup 5 – Oficials administratius</option>
                            <option value="Grup 6 – Subalterns">Grup 6 – Subalterns</option>
                            <option value="Grup 7 – Auxiliars administratius">Grup 7 – Auxiliars administratius</option>
                            <option value="Grups 8-11 – Oficials, especialistes i peons">Grups 8-11 – Oficials, especialistes i peons</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <label>Tipus de contracte <span style="color:var(--primary)">*</span></label>
                        <div class="pill-group" id="contractTypePills">
                            <div class="pill selected" data-value="indefinite">Indefinit</div>
                            <div class="pill" data-value="temporary">Temporal</div>
                        </div>
                        <input type="hidden" id="contract_type" name="contract_type" value="indefinite">
                    </div>
                    <button type="submit" class="btn-submit">Calcular increment</button>
                </form>
            </div>

            <!-- RIGHT: results -->
            <div class="result-panel">
                <div class="result-placeholder" id="resultPlaceholder">
                    Introdueix els sous i prem <strong>Calcular increment</strong> per veure la diferència neta.
                </div>
                <div id="result"></div>
            </div>

        </div>
    </div>

    <footer class="site-footer" id="site-footer"></footer>

    <script src="shared.js"></script>
    <script>
    document.querySelectorAll('#contractTypePills .pill').forEach(pill => {
        pill.onclick = function() {
            document.querySelectorAll('#contractTypePills .pill').forEach(p => p.classList.remove('selected'));
            pill.classList.add('selected');
            document.getElementById('contract_type').value = pill.getAttribute('data-value');
        };
    });

    document.getElementById('incrementForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const souActual = parseFloat(document.getElementById('sou_actual').value);
        const souNou = parseFloat(document.getElementById('sou_nou').value);
        const nPagues = parseInt(document.getElementById('n_pagues').value);
        const grupCotitzacio = document.getElementById('grup_cotitzacio').value;
        const contractType = document.getElementById('contract_type').value;

        const placeholder = document.getElementById('resultPlaceholder');
        const resultEl = document.getElementById('result');

        if (isNaN(souActual) || isNaN(souNou) || souNou <= souActual) {
            placeholder.style.display = 'none';
            resultEl.innerHTML = '<div style="color:#dc3545;padding:12px 0">El nou sou ha de ser superior al sou actual.</div>';
            return;
        }

        placeholder.style.display = 'none';
        resultEl.innerHTML = '<div style="color:#888;padding:20px 0;text-align:center">Calculant…</div>';

        try {
            const response = await fetch('https://understanding-taxes-111926362104.europe-west1.run.app/api/increment', {
            // const response = await fetch('http://localhost:8000/api/increment', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    previous_gross: souActual,
                    new_gross: souNou,
                    n_pagues: nPagues,
                    pagues_prorratejades: false,
                    retribucio_en_especie_ann: 0,
                    grup_cotitzacio: grupCotitzacio,
                    contract_type: contractType,
                    other_deductions: 0,
                    age: 30
                })
            });
            if (!response.ok) throw new Error('API error');
            const result = await response.json();
            const fmt = (n) => '€' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, '.');
            resultEl.innerHTML = `
<div style="font-size:0.95em;text-align:left;line-height:1.75;background:#f8f8f8;border-radius:12px;padding:20px 18px;border:1px solid #eee">
  <div style="font-weight:700;color:#e2231a;margin-bottom:10px;font-size:0.95em;letter-spacing:0.04em;font-family:Inter,sans-serif">RESUM DE L'INCREMENT</div>
  <span style="color:#888">Increment brut anual:</span> +${fmt(result.increment_annual_brut)}<br>
  <span style="color:#888">− SS addicional:</span> −${fmt(result.increment_annual_ss)}<br>
  <span style="color:#888">− IRPF addicional:</span> −${fmt(result.increment_annual_irpf)}<br>
  <b>Increment net anual: ${fmt(result.increment_annual_net)}</b>
  <div style="border-top:1px solid #e0e4ea;margin:8px 0"></div>
  <b style="font-size:1.08em">Increment net per paga (${nPagues}): ${fmt(result.increment_annual_net / nPagues)}</b><br>
  <span style="color:#888;font-size:0.88em">Equivalent mensual (÷12): ${fmt(result.increment_monthly_net)}</span>
</div>
${result.increment_pie ? `<div style="margin-top:18px"><img src="data:image/png;base64,${result.increment_pie}" style="max-width:100%;border-radius:10px"></div>` : ''}`;

            if (window.innerWidth < 1024) {
                document.querySelector('.result-panel').scrollIntoView({behavior:'smooth', block:'start'});
            }
        } catch (err) {
            resultEl.innerHTML = '<div style="color:#dc3545;padding:12px 0">Error: ' + err.message + '</div>';
        }
    });
    </script>
</body>
</html>
